<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>KalidoKit - Vtuber Templates</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0f0f;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
      }
      h1 { font-size: 2rem; letter-spacing: 0.05em; }
      .cards {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 2rem 3rem;
        text-align: center;
        text-decoration: none;
        color: #fff;
        transition: border-color 0.2s, background 0.2s;
      }
      .card:hover {
        border-color: #666;
        background: #222;
      }
      .card h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
      .card p { color: #888; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>KalidoKit Vtuber Templates</h1>
    <div class="cards">
      <a class="card" href="/live2d/">
        <h2>Live2D</h2>
        <p>Face tracking with Live2D avatar</p>
      </a>
      <a class="card" href="/3d/">
        <h2>VRM 3D</h2>
        <p>Full body tracking with VRM avatar</p>
      </a>
    </div>
  </body>
</html>
